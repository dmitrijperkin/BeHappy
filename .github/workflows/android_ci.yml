name: Android Production APK Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle
      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew
      - name: Run Tests and Lint
        run: ./gradlew testReleaseUnitTest lintRelease
      - name: Build Release APK
        run: ./gradlew assembleRelease
      - name: Find APK File
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*-release-unsigned.apk" | head -n 1)
          DIR_PATH=$(dirname "$APK_PATH")
          echo "apk_dir=$DIR_PATH" >> $GITHUB_OUTPUT
      - name: Sign Android Release (APK)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ${{ steps.find_apk.outputs.apk_dir }}
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}