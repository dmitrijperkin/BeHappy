name: Android Production APK Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle
      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew
      - name: Run Tests and Lint
        run: ./gradlew testReleaseUnitTest lintRelease
      - name: Build Release APK
        run: ./gradlew assembleRelease
      - name: Find APK File
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*-release-unsigned.apk" | head -n 1)
          DIR_PATH=$(dirname "$APK_PATH")
          echo "apk_dir=$DIR_PATH" >> $GITHUB_OUTPUT
      - name: Sign APK Manually
        run: |
          # 1. Создаем файл ключа из Base64
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
          
          # 2. Находим путь к актуальному apksigner на сервере GitHub
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)
          
          # 3. Находим наш неподписанный APK
          UNSIGNED_APK=$(find ./behappy/build/outputs/apk/release -name "*-release-unsigned.apk")
          SIGNED_APK="./behappy/build/outputs/apk/release/app-release-signed.apk"
          
          # 4. Подписываем
          $APKSIGNER sign --ks release.keystore \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out $SIGNED_APK $UNSIGNED_APK
          
          echo "SIGNED_APK_PATH=$SIGNED_APK" >> $GITHUB_ENV
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ env.SIGNED_APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}